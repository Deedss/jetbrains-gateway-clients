name: Docker Image CI
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag"
        required: true
        default: "latest"
      ide_version:
        description: "IDE major version for API fallback (e.g. 2025.3)"
        required: false
        default: "2025.3"
      intellij_build:
        description: "IntelliJ build filter (e.g. 251.23774.435), leave empty to resolve from API"
        required: false
      clion_build:
        description: "CLion build filter (e.g. 251.23774.103), leave empty to resolve from API"
        required: false
      pycharm_build:
        description: "PyCharm build filter (e.g. 251.23774.226), leave empty to resolve from API"
        required: false
      rustrover_build:
        description: "RustRover build filter (e.g. 251.23774.103), leave empty to resolve from API"
        required: false
env:
  IMAGE_NAME: deedss/jetbrains-remote-development
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Check secrets
        run: |
          echo "Username is set: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "Token is set: ${{ secrets.DOCKERHUB_TOKEN != '' }}"
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
          build-args: |
            IDE_VERSION=${{ github.event.inputs.ide_version }}
            INTELLIJ_BUILD=${{ github.event.inputs.intellij_build }}
            RUSTROVER_BUILD=${{ github.event.inputs.rustrover_build }}
            CLION_BUILD=${{ github.event.inputs.clion_build }}
            PYCHARM_BUILD=${{ github.event.inputs.pycharm_build }}
