name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: false
        default: "2025.3"

env:
  IMAGE_NAME: deedss/jetbrains-remote-development

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check secrets
        run: |
          echo "Username is set: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "Token is set: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
          build-args: |
            IDE_VERSION=${{ github.event.inputs.tag }}
